<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · Casa Ristoranti Italiano</title>
  <link rel="icon" type="image/svg+xml" href="assets/svg/diamond.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=EB+Garamond:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/typography.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <style>
    .nf {
      min-height: 88vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: var(--rail);
    }
    .nf__num {
      font-family: var(--font-display);
      font-size: clamp(8rem, 4rem + 18vw, 22rem);
      line-height: 0.85;
      color: var(--terracotta);
      letter-spacing: -0.02em;
    }
    .nf__title {
      font-family: var(--font-italic);
      font-style: italic;
      font-size: clamp(1.625rem, 1.25rem + 1.5vw, 2.25rem);
      color: var(--ink);
      margin-bottom: 1rem;
    }
    .nf__sub {
      font-family: var(--font-italic);
      font-style: italic;
      color: var(--ink-mute);
      max-width: 40ch;
      margin: 0 auto 2rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <p class="nf__num">404</p>
      <p class="nf__title">A wrong turn between the kitchen and the dining room.</p>
      <p class="nf__sub">The page you were looking for isn't on the menu. The bread basket is — it's still warm — back at the front door.</p>
      <a href="/" class="btn">Back to Casa <span class="btn__arrow">→</span></a>
    </div>
  </main>
</body>
</html>
