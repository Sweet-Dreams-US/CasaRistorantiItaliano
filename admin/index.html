<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa · Admin</title>
  <meta name="description" content="Casa Restaurant Group operator dashboard — orders, analytics, accounting, menu, specials, events, reservations, reviews, and settings across all four Fort Wayne locations." />
  <meta name="theme-color" content="#1A1410" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/svg/diamond.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- Demo banner -->
<div class="demo-banner">
  ✦ Demo dashboard · sample data · production version connects to Toast POS, OpenTable, Sanity CMS, and Stripe ·
  <a href="../index.html">back to public site</a>
</div>

<div class="app">
  <!-- ===== Topbar ===== -->
  <header class="topbar">
    <a href="index.html" class="topbar__brand" aria-label="Casa Admin home">
      <span class="topbar__brand-mark">Casa</span>
    </a>
    <span class="topbar__divider"></span>
    <span class="topbar__label">Operator Console</span>

    <div class="loc-switch" role="group" aria-label="Location filter">
      <span class="loc-switch__label">Showing</span>
      <div class="loc-switch__group" id="loc-switch">
        <button type="button" class="loc-switch__btn is-active" data-loc="all">All Casas</button>
        <button type="button" class="loc-switch__btn" data-loc="dupont">Dupont</button>
        <button type="button" class="loc-switch__btn" data-loc="stellhorn">Stellhorn</button>
        <button type="button" class="loc-switch__btn" data-loc="jefferson">W. Jefferson</button>
        <button type="button" class="loc-switch__btn" data-loc="parnell">Parnell</button>
      </div>
    </div>

    <div class="topbar__user">
      <span class="topbar__avatar">TC</span>
      <span style="font-size: 0.875rem;">Tom Casaburo</span>
    </div>
  </header>

  <!-- ===== Sidebar ===== -->
  <nav class="sidebar" aria-label="Admin navigation">
    <div class="sidebar__group">Today</div>
    <button class="nav-tab is-active" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13l9-9 9 9"/><path d="M5 11v9h4v-6h6v6h4v-9"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="nav-tab" data-tab="orders">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14l-1.5 11a2 2 0 0 1-2 2h-7a2 2 0 0 1-2-2L5 7z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
      <span>Orders</span>
      <span class="nav-tab__count" id="orders-badge">7</span>
    </button>
    <button class="nav-tab" data-tab="reservations">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      <span>Reservations</span>
      <span class="nav-tab__count" id="resv-badge">14</span>
    </button>
    <button class="nav-tab" data-tab="events">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"/><path d="M3 11h18M9 3v4M15 3v4"/></svg>
      <span>Events &amp; Catering</span>
      <span class="nav-tab__count" id="events-badge">5</span>
    </button>

    <div class="sidebar__group">Insights</div>
    <button class="nav-tab" data-tab="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      <span>Analytics</span>
    </button>
    <button class="nav-tab" data-tab="accounting">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h4"/></svg>
      <span>Accounting</span>
    </button>

    <div class="sidebar__group">Manage</div>
    <button class="nav-tab" data-tab="menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
      <span>Menu Editor</span>
    </button>
    <button class="nav-tab" data-tab="specials">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 10 17 15 18 22 12 18 6 22 7 15 2 10 9 9 12 2"/></svg>
      <span>Specials</span>
    </button>
    <button class="nav-tab" data-tab="reviews">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
      <span>Reviews</span>
      <span class="nav-tab__count" id="reviews-badge">3</span>
    </button>
    <button class="nav-tab" data-tab="customers">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Customers</span>
    </button>

    <div class="sidebar__group">Configuration</div>
    <button class="nav-tab" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span>Settings</span>
    </button>
    <button class="nav-tab" data-tab="integrations">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18h2a4 4 0 1 0 0-8h-2"/><path d="M8 6H6a4 4 0 1 0 0 8h2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Integrations</span>
    </button>

    <div class="sidebar__footer">
      <a href="../index.html">↗ View public site</a>
      <a href="#">⎋ Sign out</a>
    </div>
  </nav>

  <!-- ===== Main ===== -->
  <main class="main" id="main">
    <!-- Tab panes are mounted here by admin.js -->
  </main>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
